name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret to File
        uses: MobileDevOps/secret-to-file-action@v1.0.0
        with:
          base64-encoded-secret: ${{ secrets.FILE_CONTENT }}
          filename: ".env"
          is-executable: true
          working-directory: "./"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('smithy/**/*.gradle', 'smithy/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable (if present)
        run: |
          if [ -f smithy/gradlew ]; then
            chmod +x smithy/gradlew
          else
            echo "No smithy/gradlew found — skipping make step"
          fi

      - name: Generate Smithy Java sources (if configured)
        run: |
          if [ -f smithy/gradlew ]; then
            (cd smithy && ./gradlew generateAllJavaServers --no-daemon -p smithy)
          elif [ -f smithy/build.gradle ]; then
            echo "No gradle wrapper found, attempting system gradle"
            gradle -p smithy generateAllJavaServers --no-daemon || echo "Gradle generation failed, continuing"
          else
            echo "No Smithy build configuration found — skipping generation"
          fi

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw -B -DskipTests clean package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/Github-organizations-ms-0.0.1-SNAPSHOT.jar
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret to File
        uses: MobileDevOps/secret-to-file-action@v1.0.0
        with:
          base64-encoded-secret: ${{ secrets.FILE_CONTENT }}
          filename: ".env.properties"
          is-executable: true
          working-directory: "./"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B verify

      - name: SonarCloud analysis
        if: ${{ env.SONAR_TOKEN != '' && vars.SONAR_ORGANIZATION != '' }}
        uses: sonarsource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=dtarqui_Github-organizations-ms
            -Dsonar.projectName=Github-organizations-ms
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.test.binaries=target/test-classes

  docker-push:
    needs: [ build, test ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker image repository
        env:
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
        run: |
          IMAGE_REPO="$DOCKERHUB_REPOSITORY"

          if [ -z "$IMAGE_REPO" ] && [ -f .env ]; then
            IMAGE_REPO=$(grep -E '^DOCKERHUB_REPOSITORY=' .env | tail -n 1 | cut -d '=' -f2- || true)
          fi

          if [ -z "$IMAGE_REPO" ] && [ -f .env.properties ]; then
            IMAGE_REPO=$(grep -E '^DOCKERHUB_REPOSITORY=' .env.properties | tail -n 1 | cut -d '=' -f2- || true)
          fi

          if [ -z "$IMAGE_REPO" ]; then
            IMAGE_REPO="github-organizations-ms"
          fi

          echo "IMAGE_REPO=$IMAGE_REPO" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          labels: |
            org.opencontainers.image.title=Github-organizations-ms
            org.opencontainers.image.description=Microservicio de organizaciones y gestion de miembros/roles por organizacion
            org.opencontainers.image.vendor=Githubx
            org.opencontainers.image.url=https://github.com/dtarqui/Github-organizations-ms
            org.opencontainers.image.source=https://github.com/dtarqui/Github-organizations-ms
            org.opencontainers.image.documentation=https://github.com/dtarqui/Github-organizations-ms/blob/main/README.md
            org.opencontainers.image.authors=dtarqui
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPO }}:latest
